<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader+</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  background:#070a10;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:#f5f7fb;
  display:flex;
  justify-content:center;
  padding:44px 20px;
}

.app{
  width:520px;
  max-width:100%;
}

.header{
  text-align:center;
  margin:70px 0 54px;
}

h1{
  margin:0 0 18px;
  font-size:34px;
  font-weight:760;
  letter-spacing:-0.8px;
}

.rate-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 18px;
  border-radius:999px;
  background:#121820;
  border:1px solid #232b38;
  color:#9da9bd;
  font-size:22px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

.rate-input{
  width:54px;
  border:0;
  outline:0;
  background:transparent;
  color:#cbd6e8;
  font:inherit;
  font-weight:650;
  text-align:center;
  padding:0;
}

.money-input{
  display:flex;
  align-items:center;
  gap:16px;
  width:100%;
  height:84px;
  padding:0 28px;
  border-radius:26px;
  background:#090d15;
  border:1px solid #242b38;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

.currency{
  font-size:42px;
  font-weight:800;
  color:#a8b2c5;
}

.money-input input{
  flex:1;
  min-width:0;
  border:0;
  outline:0;
  background:transparent;
  color:#f5f7fb;
  font-size:52px;
  font-weight:760;
  letter-spacing:-1.5px;
}

.money-input input::placeholder{color:#252b37;}

.aud-label{
  color:#8e95a3;
  font-size:26px;
  font-weight:760;
}

.fair-card{
  margin-top:24px;
  min-height:160px;
  border-radius:28px;
  border:1px solid rgba(255,196,45,.42);
  background:rgba(255,196,45,.10);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

.fair-title{
  color:#d4a51f;
  font-size:26px;
  margin-bottom:8px;
}

.fair-value{
  color:#ffc42d;
  font-size:78px;
  font-weight:850;
  line-height:1;
  letter-spacing:-3px;
}

.list{
  margin-top:44px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.row{
  position:relative;
  overflow:hidden;
  height:112px;
  border-radius:26px;
  background:#090d15;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px 0 26px;
}

.row::before{
  content:"";
  position:absolute;
  left:0;
  top:18px;
  bottom:18px;
  width:5px;
  border-radius:0 6px 6px 0;
  background:var(--accent);
}

.row-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.icon{
  width:62px;
  height:62px;
  border-radius:50%;
  background:var(--icon-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
}

.row-title{
  font-size:26px;
  font-weight:720;
  letter-spacing:-0.4px;
}

.row-sub{
  margin-top:4px;
  color:#9da9bd;
  font-size:19px;
}

.row-value{
  color:var(--accent);
  font-size:42px;
  font-weight:830;
  letter-spacing:-1.5px;
}

.quick{
  --accent:#4e9cff;
  --border:rgba(78,156,255,.35);
  --icon-bg:rgba(78,156,255,.12);
}

.good{
  --accent:#21e17b;
  --border:rgba(33,225,123,.35);
  --icon-bg:rgba(33,225,123,.12);
}

.high{
  --accent:#ff941f;
  --border:rgba(255,148,31,.35);
  --icon-bg:rgba(255,148,31,.12);
}

/* Offer Checker */
.offer-card{
  margin-top:34px;
  border-radius:30px;
  background:#090d15;
  border:1px solid rgba(120,130,150,.28);
  padding:26px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
  transition:border-color .25s ease, background .25s ease, box-shadow .25s ease;
}

.offer-card.lowball{
  border-color:rgba(255,82,82,.45);
  background:linear-gradient(180deg,rgba(255,82,82,.105),rgba(9,13,21,1) 75%);
}

.offer-card.fair{
  border-color:rgba(255,196,45,.45);
  background:linear-gradient(180deg,rgba(255,196,45,.11),rgba(9,13,21,1) 75%);
}

.offer-card.great{
  border-color:rgba(33,225,123,.45);
  background:linear-gradient(180deg,rgba(33,225,123,.105),rgba(9,13,21,1) 75%);
}

.offer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:20px;
}

.offer-title{
  font-size:28px;
  font-weight:800;
  letter-spacing:-.5px;
}

.offer-pill{
  padding:7px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.055);
  color:#9da9bd;
  font-size:15px;
  font-weight:700;
}

.offer-input-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  height:66px;
  padding:0 18px;
  border-radius:20px;
  background:#070a10;
  border:1px solid #252d3a;
}

.offer-input-wrap input{
  flex:1;
  min-width:0;
  border:0;
  outline:0;
  background:transparent;
  color:#f5f7fb;
  font-size:34px;
  font-weight:800;
}

.offer-input-wrap input::placeholder{color:#303847;}

.offer-unit{
  color:#8994a6;
  font-size:24px;
  font-weight:800;
}

.offer-result{
  margin-top:22px;
  padding:22px;
  border-radius:24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  text-align:center;
  transition:all .25s ease;
}

.status{
  font-size:42px;
  font-weight:900;
  letter-spacing:-1px;
  line-height:1;
}

.offer-card.lowball .status{color:#ff5c5c;}
.offer-card.fair .status{color:#ffc42d;}
.offer-card.great .status{color:#21e17b;}
.offer-card.empty .status{color:#9da9bd;}

.percent{
  margin-top:10px;
  color:#d8deea;
  font-size:23px;
  font-weight:750;
  text-transform:uppercase;
  letter-spacing:.4px;
}

.offer-detail{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.detail-box{
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.055);
}

.detail-label{
  color:#8994a6;
  font-size:15px;
  font-weight:700;
}

.detail-value{
  margin-top:4px;
  font-size:28px;
  font-weight:850;
  color:#f5f7fb;
}

.footer{
  margin-top:88px;
  text-align:center;
  color:#6d737e;
  font-size:25px;
  font-weight:520;
}

@media(max-width:520px){
  body{padding:24px 16px;}
  .header{margin:52px 0 44px;}
  h1{font-size:31px;}
  .rate-pill{font-size:20px;}
  .money-input{height:78px;padding:0 22px;border-radius:24px;}
  .money-input input{font-size:46px;}
  .currency{font-size:38px;}
  .aud-label{font-size:23px;}
  .fair-card{min-height:148px;}
  .fair-value{font-size:72px;}
  .list{margin-top:36px;}
  .row{height:104px;padding-right:22px;}
  .icon{width:56px;height:56px;font-size:30px;}
  .row-title{font-size:24px;}
  .row-sub{font-size:17px;}
  .row-value{font-size:38px;}
  .offer-card{padding:22px;border-radius:28px;}
  .offer-title{font-size:25px;}
  .offer-pill{font-size:13px;}
  .status{font-size:35px;}
  .percent{font-size:19px;}
  .detail-value{font-size:24px;}
  .footer{font-size:22px;margin-top:76px;}
}
</style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Trader+</h1>
      <div class="rate-pill">
        <span>1 AUD =</span>
        <input id="rate" class="rate-input" type="number" step="1" min="1" value="25" oninput="saveRate(); calc()">
        <span>Credits</span>
      </div>
    </section>

    <section class="money-input">
      <span class="currency">$</span>
      <input id="aud" type="number" step="0.01" placeholder="0.00" oninput="calc()">
      <span class="aud-label">AUD</span>
    </section>

    <section class="fair-card">
      <div class="fair-title">Fair Value</div>
      <div id="fair" class="fair-value">0</div>
    </section>

    <section class="list">
      <div class="row quick">
        <div class="row-left">
          <div class="icon">⚡</div>
          <div>
            <div class="row-title">Quick Sell</div>
            <div class="row-sub">Fair Value × 0.95</div>
          </div>
        </div>
        <div id="quick" class="row-value">0</div>
      </div>

      <div class="row good">
        <div class="row-left">
          <div class="icon">✅</div>
          <div>
            <div class="row-title">Good Sell</div>
            <div class="row-sub">Fair Value × 1.10</div>
          </div>
        </div>
        <div id="good" class="row-value">0</div>
      </div>

      <div class="row high">
        <div class="row-left">
          <div class="icon">🔥</div>
          <div>
            <div class="row-title">High Ask</div>
            <div class="row-sub">Fair Value × 1.25</div>
          </div>
        </div>
        <div id="high" class="row-value">0</div>
      </div>
    </section>

    <section id="offerCard" class="offer-card empty">
      <div class="offer-head">
        <div class="offer-title">Offer Checker</div>
        <div class="offer-pill">Buyer vs Fair</div>
      </div>

      <div class="offer-input-wrap">
        <input id="offer" type="number" step="1" placeholder="300" oninput="calc()">
        <span class="offer-unit">c</span>
      </div>

      <div class="offer-result">
        <div id="offerStatus" class="status">ENTER OFFER</div>
        <div id="offerPercent" class="percent">Compare buyer offer against fair value</div>

        <div class="offer-detail">
          <div class="detail-box">
            <div class="detail-label">Buyer Offered</div>
            <div id="buyerValue" class="detail-value">0</div>
          </div>
          <div class="detail-box">
            <div class="detail-label">Fair Value</div>
            <div id="fairSmall" class="detail-value">0</div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">Made for Habbo NFT Trading ❤️</footer>
  </main>

<script>
const rateInput = document.getElementById('rate');
const savedRate = localStorage.getItem('habbo_credit_rate');

if(savedRate){
  rateInput.value = savedRate;
}

function getRate(){
  return parseFloat(rateInput.value) || 25;
}

function saveRate(){
  localStorage.setItem('habbo_credit_rate', getRate());
}

const values = {fair:0, quick:0, good:0, high:0};

function animateValue(id, target){
  const start = values[id] || 0;
  const duration = 350;
  const startTime = performance.now();

  function frame(now){
    const progress = Math.min((now-startTime)/duration,1);
    const eased = 1 - Math.pow(1-progress,3);
    const current = Math.round(start + (target-start)*eased);
    document.getElementById(id).textContent = '' + current;

    if(progress < 1){
      requestAnimationFrame(frame);
    }else{
      values[id] = target;
    }
  }

  requestAnimationFrame(frame);
}

function setOfferState(state, status, percentText, offer, fair){
  const card = document.getElementById('offerCard');
  card.className = 'offer-card ' + state;

  document.getElementById('offerStatus').textContent = status;
  document.getElementById('offerPercent').textContent = percentText;
  document.getElementById('buyerValue').textContent = '' + offer;
  document.getElementById('fairSmall').textContent = '' + fair;
}

function calc(){
  const aud = parseFloat(document.getElementById('aud').value) || 0;
  const fair = Math.round(aud * getRate());

  animateValue('fair', fair);
  animateValue('quick', Math.round(fair * 0.95));
  animateValue('good', Math.round(fair * 1.10));
  animateValue('high', Math.round(fair * 1.25));

  const offer = Math.round(parseFloat(document.getElementById('offer').value) || 0);

  if(!offer || !fair){
    setOfferState('empty','ENTER OFFER','Compare buyer offer against fair value',offer,fair);
    return;
  }

  const diff = ((offer - fair) / fair) * 100;
  const absDiff = Math.abs(diff).toFixed(1);

  if(diff <= -10){
    setOfferState('lowball','🔴 LOWBALL',absDiff + '% BELOW FAIR VALUE',offer,fair);
  }else if(diff < -5){
    setOfferState('lowball','🔴 BELOW FAIR',absDiff + '% BELOW FAIR VALUE',offer,fair);
  }else if(diff <= 5){
    setOfferState('fair','🟡 FAIR OFFER',absDiff + '% FROM FAIR VALUE',offer,fair);
  }else if(diff < 15){
    setOfferState('great','🟢 GOOD OFFER',absDiff + '% ABOVE FAIR VALUE',offer,fair);
  }else{
    setOfferState('great','🟢 GREAT DEAL',absDiff + '% ABOVE FAIR VALUE',offer,fair);
  }
}

calc();
</script>
</body>
</html>
